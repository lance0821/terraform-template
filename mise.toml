# ─────────────────────────────────────────────────────────────────────────────
# mise.toml — LOCAL DEVELOPMENT ONLY
#
# CI workflows call tools directly (see .github/workflows/ci.yml).
# This file manages tool versions and local dev convenience tasks.
# ─────────────────────────────────────────────────────────────────────────────

[tools]
terraform      = "1.14.5"
aws-cli        = "2"
tflint         = "0.61.0"
gitleaks       = "8.30.0"
terraform-docs = "0.21.0"
checkov        = "3.2.506"
pre-commit     = "4"
python         = "3.12"
uv             = "latest"
kubectl        = "latest"

[env]
_.file         = ".env"
TF_DIR         = "infra"
TF_IN_AUTOMATION = "true"
AWS_REGION     = "us-east-1"

[settings]

# ─────────────────────────────────────────────────────────────────────────────
# Terraform
# ─────────────────────────────────────────────────────────────────────────────

[tasks."tf:init"]
description = "Initialize Terraform with S3 backend (requires .env)"
run = """
#!/usr/bin/env bash
set -euo pipefail
: "${TF_STATE_BUCKET:?Set TF_STATE_BUCKET in .env}"
: "${TF_STATE_PREFIX:?Set TF_STATE_PREFIX in .env}"
: "${TF_STATE_ENV:?Set TF_STATE_ENV in .env}"
mkdir -p .terraform.d/plugin-cache
TF_PLUGIN_CACHE_DIR=.terraform.d/plugin-cache terraform -chdir=${TF_DIR} init -input=false \
  -reconfigure \
  -backend-config=bucket=${TF_STATE_BUCKET} \
  -backend-config=key=${TF_STATE_PREFIX}/${TF_STATE_ENV}/terraform.tfstate \
  -backend-config=region=${AWS_REGION} \
  -backend-config=encrypt=true \
  -backend-config=use_lockfile=true
"""

[tasks."tf:plan"]
description = "Plan (saves to tfplan)"
depends     = ["tf:init"]
run         = "terraform -chdir=${TF_DIR} plan -input=false -out=tfplan"

[tasks."tf:apply"]
description = "Apply saved plan"
depends     = ["tf:plan"]
run         = "terraform -chdir=${TF_DIR} apply -input=false tfplan"

[tasks."tf:destroy"]
description = "Destroy infrastructure"
depends     = ["tf:init"]
run         = "terraform -chdir=${TF_DIR} destroy -input=false"

[tasks."tf:fmt"]
description = "Format all .tf files"
run         = "terraform fmt -recursive"

[tasks."tf:fmt-check"]
description = "Check formatting (no writes)"
run         = "terraform fmt -check -recursive"

[tasks."tf:validate"]
description = "Validate configuration"
run = """
mkdir -p .terraform.d/plugin-cache
TF_PLUGIN_CACHE_DIR=.terraform.d/plugin-cache terraform -chdir=${TF_DIR} init -backend=false -input=false -lockfile=readonly >/dev/null
terraform -chdir=${TF_DIR} validate
"""

[tasks."tf:test"]
description = "Run Terraform tests (from repo root)"
run = """
#!/usr/bin/env bash
set -euo pipefail
mkdir -p .terraform.d/plugin-cache
for d in modules/*/; do
  if ls "$d"/*.tf >/dev/null 2>&1; then
    TF_PLUGIN_CACHE_DIR=.terraform.d/plugin-cache \
      terraform -chdir="$d" init -backend=false -input=false -lockfile=readonly >/dev/null
  fi
done
terraform test
"""

# ─────────────────────────────────────────────────────────────────────────────
# Linting & Security
# ─────────────────────────────────────────────────────────────────────────────

[tasks."lint"]
description = "TFLint on infra + modules"
run = """
#!/usr/bin/env bash
set -euo pipefail
tflint --init --config=.tflint.hcl

mkdir -p .terraform.d/plugin-cache

# Lint infra/
TF_PLUGIN_CACHE_DIR=.terraform.d/plugin-cache terraform -chdir=${TF_DIR} init -backend=false -input=false -lockfile=readonly >/dev/null
tflint --chdir=${TF_DIR} --config=../.tflint.hcl --call-module-type=none

# Lint each module
for d in modules/*/; do
  if ls "$d"/*.tf >/dev/null 2>&1; then
    TF_PLUGIN_CACHE_DIR=.terraform.d/plugin-cache terraform -chdir="$d" init -backend=false -input=false -lockfile=readonly >/dev/null
    tflint --chdir="$d" --config=../../.tflint.hcl
  fi
done
"""

[tasks."checkov"]
description = "Checkov scan (owned code only)"
run = "checkov --config-file .checkov.yml -d ${TF_DIR} --download-external-modules false"

[tasks."gitleaks"]
description = "Scan for secrets"
run = "gitleaks detect --redact --no-git --config .gitleaks.toml"

[tasks."check"]
description = "Run all local checks"
depends     = ["tf:fmt-check", "tf:validate", "lint", "checkov", "gitleaks"]

# ─────────────────────────────────────────────────────────────────────────────
# Kubernetes
# ─────────────────────────────────────────────────────────────────────────────

[tasks."kube:config"]
description = "Update kubeconfig for the EKS cluster"
depends     = ["tf:init"]
run         = 'aws eks update-kubeconfig --region ${AWS_REGION} --name "$(terraform -chdir=${TF_DIR} output -raw cluster_name)"'

[tasks."kube:whoami"]
description = "Show current context and nodes"
run         = "kubectl config current-context && kubectl get nodes"

[tasks."kube:placement"]
description = "Show pod → node → capacity type"
run = """
kubectl get pods -n default -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.nodeName}{"\n"}{end}' | while read -r pod node; do
  if [[ -z "$node" ]]; then echo "$pod PENDING"; continue; fi
  cap=$(kubectl get node "$node" -o jsonpath='{.metadata.labels.eks\\.amazonaws\\.com/capacityType}')
  echo "$pod $node ${cap:-UNKNOWN}"
done
"""

# ─────────────────────────────────────────────────────────────────────────────
# Utilities
# ─────────────────────────────────────────────────────────────────────────────

[tasks."aws:whoami"]
description = "Show active AWS identity"
run         = "aws sts get-caller-identity"

[tasks."pre-commit:install"]
description = "Install git hooks"
run         = "bash .devcontainer/scripts/install-git-hooks.sh"

[tasks."pre-commit:run"]
description = "Run all pre-commit hooks"
run         = "pre-commit run --all-files"

[tasks."docs"]
description = "Generate terraform-docs for modules"
run         = "terraform-docs markdown table --output-file README.md --output-mode inject modules/"
